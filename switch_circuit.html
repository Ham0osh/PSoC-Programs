<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1e1e1e; display: flex; justify-content: center; padding: 40px; }
  svg { background: #2d2d2d; border-radius: 8px; padding: 20px; }
  text { font-family: monospace; font-size: 13px; fill: #ccc; }
  text.label { font-size: 12px; fill: #888; }
  line, path { stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<svg width="420" height="480" viewBox="0 0 420 480">

  <!-- 3.3V rail -->
  <line x1="180" y1="30" x2="240" y2="30" stroke="#ff6b6b" stroke-width="2"/>
  <text x="195" y="22" fill="#ff6b6b" font-size="13" font-family="monospace">3.3V</text>

  <!-- Wire from 3.3V down to switch top -->
  <line x1="210" y1="30" x2="210" y2="70" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Switch symbol -->
  <circle cx="210" cy="80" r="4" fill="none" stroke="#aaa" stroke-width="2"/>
  <circle cx="210" cy="120" r="4" fill="none" stroke="#aaa" stroke-width="2"/>
  <!-- switch lever (closed position shown) -->
  <line x1="210" y1="84" x2="210" y2="116" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="210" y1="84" x2="210" y2="108" stroke="#fff" stroke-width="2"/>
  <text x="225" y="105" class="label">SWITCH</text>

  <!-- Wire from switch bottom to Node B -->
  <line x1="210" y1="124" x2="210" y2="180" stroke="#4fc3f7" stroke-width="2"/>

  <!-- Node B dot -->
  <circle cx="210" cy="180" r="5" fill="#4fc3f7"/>
  <text x="218" y="177" fill="#4fc3f7" font-size="12" font-family="monospace">Node B</text>

  <!-- Left branch: pull-down 10k to GND -->
  <line x1="210" y1="180" x2="100" y2="180" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="100" y1="180" x2="100" y2="220" stroke="#4fc3f7" stroke-width="2"/>
  <!-- Resistor box -->
  <rect x="82" y="220" width="36" height="60" fill="#2d2d2d" stroke="#ffd54f" stroke-width="2" rx="4"/>
  <text x="88" y="255" fill="#ffd54f" font-size="12" font-family="monospace">10kΩ</text>
  <line x1="100" y1="280" x2="100" y2="330" stroke="#4fc3f7" stroke-width="2"/>
  <!-- GND symbol -->
  <line x1="80"  y1="330" x2="120" y2="330" stroke="#888" stroke-width="2"/>
  <line x1="87"  y1="338" x2="113" y2="338" stroke="#888" stroke-width="2"/>
  <line x1="94"  y1="346" x2="106" y2="346" stroke="#888" stroke-width="2"/>
  <text x="78" y="365" class="label">GND</text>

  <!-- Center branch: GPIO -->
  <line x1="210" y1="180" x2="210" y2="230" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="210" y1="230" x2="310" y2="230" stroke="#4fc3f7" stroke-width="2"/>
  <!-- GPIO pin box -->
  <rect x="310" y="210" width="80" height="40" fill="#1a3a1a" stroke="#66bb6a" stroke-width="2" rx="4"/>
  <text x="318" y="228" fill="#66bb6a" font-size="12" font-family="monospace">MCU</text>
  <text x="318" y="242" fill="#66bb6a" font-size="12" font-family="monospace">GPIO</text>

  <!-- Right branch: LED -->
  <line x1="210" y1="180" x2="210" y2="300" stroke="#4fc3f7" stroke-width="2"/>

  <!-- LED symbol (triangle + bar) -->
  <!-- anode line -->
  <line x1="210" y1="300" x2="210" y2="315" stroke="#4fc3f7" stroke-width="2"/>
  <!-- triangle pointing down -->
  <polygon points="195,315 225,315 210,340" fill="#ffeb3b" stroke="#ffeb3b" stroke-width="1"/>
  <!-- cathode bar -->
  <line x1="195" y1="340" x2="225" y2="340" stroke="#ffeb3b" stroke-width="2.5"/>
  <!-- LED glow lines -->
  <line x1="228" y1="322" x2="238" y2="312" stroke="#ffeb3b" stroke-width="1.5"/>
  <line x1="232" y1="330" x2="244" y2="323" stroke="#ffeb3b" stroke-width="1.5"/>
  <text x="248" y="328" fill="#ffeb3b" font-size="12" font-family="monospace">LED</text>

  <!-- Wire from LED cathode down to resistor -->
  <line x1="210" y1="340" x2="210" y2="370" stroke="#4fc3f7" stroke-width="2"/>
  <!-- Resistor box -->
  <rect x="192" y="370" width="36" height="50" fill="#2d2d2d" stroke="#ffd54f" stroke-width="2" rx="4"/>
  <text x="196" y="399" fill="#ffd54f" font-size="12" font-family="monospace">330Ω</text>
  <!-- Wire to GND -->
  <line x1="210" y1="420" x2="210" y2="450" stroke="#4fc3f7" stroke-width="2"/>
  <!-- GND symbol -->
  <line x1="190" y1="450" x2="230" y2="450" stroke="#888" stroke-width="2"/>
  <line x1="197" y1="458" x2="223" y2="458" stroke="#888" stroke-width="2"/>
  <line x1="204" y1="466" x2="216" y2="466" stroke="#888" stroke-width="2"/>
  <text x="198" y="480" class="label">GND</text>

</svg>
</body>
</html>
